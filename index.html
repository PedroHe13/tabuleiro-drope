<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TI Quest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .setup-screen {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            margin: 50px auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #1e3c72;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .team-selector {
            margin: 30px 0;
            text-align: center;
        }

        .team-selector label {
            display: block;
            font-size: 18px;
            margin-bottom: 10px;
            color: #333;
        }

        .team-selector select {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #1e3c72;
            border-radius: 10px;
            cursor: pointer;
        }

        .teams-config {
            margin: 30px 0;
        }

        .team-input {
            margin: 15px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 5px solid;
        }

        .team-input h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .team-input input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }

        .team-input input:focus {
            outline: none;
            border-color: #1e3c72;
        }

        .btn {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .game-screen {
            display: none;
        }

        .game-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .game-container {
                grid-template-columns: 1fr;
            }
        }

        .board-section {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .board-3d-wrapper {
            perspective: 1500px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 500px;
        }

        .board {
            position: relative;
            width: 600px;
            height: 600px;
            max-width: 90vw;
            max-height: 90vw;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            border: 8px solid #4f46e5;
            border-radius: 20px;
            padding: 20px;
            transform: rotateX(20deg) rotateZ(0deg);
            transform-style: preserve-3d;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .cell {
            position: absolute;
            width: 50px;
            height: 50px;
            background: white;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 13px;
            transform: translateZ(10px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .cell:hover {
            transform: translateZ(20px) scale(1.08);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .cell.start {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            font-size: 20px;
        }

        .cell.finish {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            font-size: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px #fbbf24; }
            50% { box-shadow: 0 0 30px #f59e0b; }
        }

        .cell.question {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            font-size: 18px;
        }

        .cell.action {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            font-size: 18px;
        }

        .piece {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            transform: translateZ(30px);
            z-index: 100;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .piece.moving {
            animation: bounce 0.6s;
        }

        @keyframes bounce {
            0%, 100% { transform: translateZ(30px) translateY(0); }
            50% { transform: translateZ(50px) translateY(-15px); }
        }

        .sidebar {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .sidebar h2 {
            color: #1e3c72;
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
        }

        .team-card {
            padding: 15px;
            margin: 12px 0;
            border-radius: 10px;
            border-left: 5px solid;
            background: #f8f9fa;
            transition: all 0.3s;
        }

        .team-card.active {
            background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3);
        }

        .team-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .team-pos {
            display: inline-block;
            background: #1e3c72;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            float: right;
        }

        .dice-area {
            margin-top: 30px;
            text-align: center;
        }

        .dice-display {
            font-size: 60px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        .turn-info {
            font-size: 16px;
            color: #666;
            margin-bottom: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal-title {
            color: #1e3c72;
            font-size: 28px;
            margin-bottom: 20px;
            text-align: center;
        }

        .difficulty-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .diff-easy { background: #10b981; color: white; }
        .diff-medium { background: #f59e0b; color: white; }
        .diff-hard { background: #ef4444; color: white; }

        .question-text {
            font-size: 20px;
            margin: 25px 0;
            line-height: 1.5;
            color: #333;
        }

        .option-btn {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border: 3px solid #e5e7eb;
            border-radius: 12px;
            background: white;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s;
        }

        .option-btn:hover {
            background: #f0f4ff;
            border-color: #4f46e5;
            transform: translateX(8px);
        }

        .result-box {
            padding: 25px;
            margin: 25px 0;
            border-radius: 12px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .result-correct {
            background: #d1fae5;
            color: #065f46;
            border: 3px solid #10b981;
        }

        .result-wrong {
            background: #fee2e2;
            color: #991b1b;
            border: 3px solid #ef4444;
        }

        .action-display {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            padding: 35px;
            border-radius: 15px;
            text-align: center;
            font-size: 22px;
            color: #78350f;
            margin: 25px 0;
            font-weight: bold;
        }

        .winner-box {
            text-align: center;
        }

        .winner-trophy {
            font-size: 100px;
            margin: 20px 0;
            animation: rotate 3s infinite;
        }

        @keyframes rotate {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- TELA DE CONFIGURAÇÃO -->
        <div class="setup-screen" id="setupScreen">
            <h1>🎮 TI Quest</h1>
            <p style="text-align: center; color: #666; margin-bottom: 30px;">
                Jogo de Tabuleiro sobre Tecnologia da Informação
            </p>

            <div class="team-selector">
                <label><strong>Quantas equipes vão jogar?</strong></label>
                <select id="numTeams" onchange="generateTeamInputs()">
                    <option value="2">2 Equipes</option>
                    <option value="3">3 Equipes</option>
                    <option value="4">4 Equipes</option>
                </select>
            </div>

            <div class="teams-config" id="teamsConfig"></div>

            <button class="btn" onclick="startGame()">🚀 Iniciar Jogo</button>
        </div>

        <!-- TELA DO JOGO -->
        <div class="game-screen" id="gameScreen">
            <div class="game-container">
                <div class="board-section">
                    <div class="board-3d-wrapper">
                        <div class="board" id="gameBoard"></div>
                    </div>
                </div>

                <div class="sidebar">
                    <h2>🏆 Placar</h2>
                    <div id="teamsDisplay"></div>

                    <div class="dice-area">
                        <div class="turn-info" id="turnInfo"></div>
                        <button class="btn" id="rollBtn" onclick="rollDice()">
                            🎲 Rolar Dado
                        </button>
                        <div class="dice-display" id="diceDisplay"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="gameModal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        // Cores das equipes
        const TEAM_COLORS = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b'];
        const COLOR_NAMES = ['Azul', 'Vermelho', 'Verde', 'Amarelo'];

        // Estado do jogo
        let gameState = {
            teams: [],
            currentTeamIndex: 0,
            isPlaying: false
        };

        // Banco de perguntas EXPANDIDO
        const QUESTIONS = [
            // FÁCEIS (15 perguntas)
            {q: "O que é um antivírus?", opts: ["Firewall de hardware", "Software que detecta e remove malware", "Tipo de backup", "Protocolo de rede"], ans: 1, diff: "easy", move: 3},
            {q: "Qual linguagem é conhecida como 'linguagem da web'?", opts: ["Python", "Java", "JavaScript", "C++"], ans: 2, diff: "easy", move: 3},
            {q: "O que é uma senha forte?", opts: ["Só números", "Combinação de letras, números e símbolos", "Nome da pessoa", "Data de nascimento"], ans: 1, diff: "easy", move: 3},
            {q: "Qual empresa criou o Windows?", opts: ["Apple", "Google", "Microsoft", "IBM"], ans: 2, diff: "easy", move: 3},
            {q: "O que significa malware?", opts: ["Software malicioso", "Hardware quebrado", "Erro de sistema", "Arquivo corrompido"], ans: 0, diff: "easy", move: 2},
            {q: "O que é HTTPS?", opts: ["HTTP mais rápido", "HTTP seguro com criptografia", "HTTP para mobile", "HTTP sem conexão"], ans: 1, diff: "easy", move: 2},
            {q: "Qual tag HTML cria um link?", opts: ["<link>", "<a>", "<href>", "<url>"], ans: 1, diff: "easy", move: 2},

            {q: "Qual linguagem usa 'print()' para exibir texto?", opts: ["HTML", "CSS", "Python", "SQL"], ans: 2, diff: "easy", move: 3},
            {q: "O que significa CPU?", opts: ["Central Processing Unit", "Computer Personal Unit", "Central Program Unit", "Core Processing Unit"], ans: 0, diff: "easy", move: 2},
            {q: "O que é spam?", opts: ["Vírus perigoso", "E-mail indesejado em massa", "Tipo de firewall", "Protocolo de rede"], ans: 1, diff: "easy", move: 2},
            {q: "O que é backup?", opts: ["Deletar arquivos", "Cópia de segurança dos dados", "Tipo de vírus", "Atualização de software"], ans: 1, diff: "easy", move: 2},
            {q: "O que significa 'clicar em links suspeitos' pode causar?", opts: ["Melhor desempenho", "Infecção por malware", "Mais velocidade", "Economia de bateria"], ans: 1, diff: "easy", move: 2},

            // MÉDIAS (15 perguntas)
            {q: "O que é um ataque de phishing?", opts: ["Ataque a redes físicas", "Engenharia social via e-mail falso", "Vírus de computador", "Firewall desativado"], ans: 1, diff: "medium", move: 4},
            {q: "Qual protocolo transfere páginas web?", opts: ["FTP", "SMTP", "HTTP", "SSH"], ans: 2, diff: "medium", move: 3},
            {q: "O que significa DDoS?", opts: ["Data Denial of Service", "Distributed Denial of Service", "Digital Defense System", "Direct Data Output"], ans: 1, diff: "medium", move: 3},
            {q: "O que é um firewall?", opts: ["Antivírus", "Barreira de segurança de rede", "Tipo de malware", "Protocolo de rede"], ans: 1, diff: "medium", move: 4},
            {q: "O que significa VPN?", opts: ["Virtual Private Network", "Very Private Network", "Verified Protocol Network", "Visual Program Node"], ans: 0, diff: "medium", move: 3},
            {q: "O que é localhost?", opts: ["Servidor remoto", "O próprio PC", "Tipo de rede", "Protocolo"], ans: 1, diff: "medium", move: 3},
            {q: "O que é criptografia de ponta a ponta?", opts: ["Backup automático", "Dados criptografados do remetente ao destinatário", "Antivírus em tempo real", "Protocolo de rede"], ans: 1, diff: "medium", move: 4},
            {q: "O que é JSON?", opts: ["JavaScript Object Notation", "Java Standard Object Notation", "JavaScript Online Network", "Java System Object"], ans: 0, diff: "medium", move: 4},
            {q: "Qual porta padrão do HTTPS?", opts: ["21", "80", "443", "8080"], ans: 2, diff: "medium", move: 4},
            {q: "O que é autenticação de dois fatores (2FA)?", opts: ["Backup duplo", "Camada extra de segurança no login", "Dois antivírus", "Senha com 2 caracteres"], ans: 1, diff: "medium", move: 3},
            {q: "O que é ransomware?", opts: ["Antivírus gratuito", "Malware que sequestra dados por resgate", "Firewall avançado", "Protocolo seguro"], ans: 1, diff: "medium", move: 4},
            {q: "O que é SQL Injection?", opts: ["Backup de banco", "Ataque que explora vulnerabilidade em consultas SQL", "Tipo de criptografia", "Método de autenticação"], ans: 1, diff: "medium", move: 4},
            {q: "Qual comando Git envia alterações?", opts: ["git send", "git push", "git upload", "git commit"], ans: 1, diff: "medium", move: 3},
            {q: "O que é um certificado SSL/TLS?", opts: ["Licença de software", "Certificado digital para conexão segura", "Tipo de vírus", "Backup em nuvem"], ans: 1, diff: "medium", move: 3},
            {q: "O que significa IDE?", opts: ["Integrated Development Environment", "Internet Development Editor", "Internal Design Environment", "Interface Design Editor"], ans: 0, diff: "medium", move: 4},
                        
            // DIFÍCEIS (20 perguntas com pegadinhas)
            {q: "PEGADINHA: Qual ataque explora vulnerabilidades antes de correção?", opts: ["Phishing", "Zero-day", "Brute force", "DDoS"], ans: 1, diff: "hard", move: 5},
            {q: "Complexidade da busca binária?", opts: ["O(n)", "O(log n)", "O(n²)", "O(1)"], ans: 1, diff: "hard", move: 5},
            {q: "O que é um ataque Man-in-the-Middle?", opts: ["Vírus", "Interceptação de comunicação entre duas partes", "Backup falho", "Erro de sistema"], ans: 1, diff: "hard", move: 5},
            {q: "PEGADINHA: Qual protocolo é mais seguro para e-mail?", opts: ["SMTP", "POP3", "IMAP com TLS", "HTTP"], ans: 2, diff: "hard", move: 6},
            {q: "PEGADINHA: 1 kilobyte tem quantos bytes?", opts: ["1000", "1024", "1048", "8000"], ans: 1, diff: "hard", move: 5},
            {q: "O que é DNS spoofing?", opts: ["Backup de DNS", "Manipulação de respostas DNS para redirecionar tráfego", "Protocolo seguro", "Tipo de firewall"], ans: 1, diff: "hard", move: 4},
            {q: "O que é salt em criptografia de senhas?", opts: ["Tipo de hash", "Dado aleatório adicionado antes do hash", "Algoritmo de criptografia", "Protocolo de rede"], ans: 1, diff: "hard", move: 5},
            {q: "PEGADINHA: Qual porta o SSH usa por padrão?", opts: ["21", "22", "23", "25"], ans: 1, diff: "hard", move: 6},
            {q: "PEGADINHA: O que significa CVE em segurança?", opts: ["Common Virus Entry", "Common Vulnerabilities and Exposures", "Central Virus Engine", "Cyber Virus Exploit"], ans: 1, diff: "hard", move: 6},
            {q: "O que é hoisting em JavaScript?", opts: ["Erro", "Elevação de declarações", "Loop", "Função"], ans: 1, diff: "hard", move: 5},
            {q: "O que é engenharia social?", opts: ["Programação", "Manipulação psicológica para obter informações", "Tipo de rede", "Framework"], ans: 1, diff: "hard", move: 5},
            {q: "O que é Big O notation?", opts: ["Tipo de dado", "Análise de complexidade", "Linguagem", "Framework"], ans: 1, diff: "hard", move: 5},
            {q: "PEGADINHA: Qual algoritmo é mais seguro atualmente?", opts: ["MD5", "SHA-1", "AES-256", "DES"], ans: 2, diff: "hard", move: 6},
            {q: "Qual algoritmo de ordenação é O(n log n)?", opts: ["Bubble Sort", "Quick Sort (médio)", "Merge Sort", "Selection Sort"], ans: 2, diff: "hard", move: 5},
            {q: "O que é RESTful API?", opts: ["Tipo de banco", "Arquitetura web", "Linguagem", "Framework"], ans: 1, diff: "hard", move: 5},
            {q: "PEGADINHA: O que é mais seguro para armazenar senhas?", opts: ["Texto puro", "Base64", "Hash com bcrypt/argon2", "Criptografia reversível"], ans: 2, diff: "hard", move: 6},
            {q: "O que é recursão?", opts: ["Loop infinito", "Função que chama a si mesma", "Erro", "Tipo de dado"], ans: 1, diff: "hard", move: 5},
            {q: "PEGADINHA: Qual ataque testa todas combinações possíveis?", opts: ["Phishing", "DDoS", "Brute force", "SQL Injection"], ans: 2, diff: "hard", move: 6},
            {q: "O que é privilege escalation?", opts: ["Erro de código", "Obter acesso de nível superior não autorizado", "Tipo de backup", "Protocolo de rede"], ans: 1, diff: "hard", move: 5},
            {q: "PEGADINHA: HTTPS usa qual porta por padrão?", opts: ["80", "443", "8080", "22"], ans: 1, diff: "hard", move: 6}
        ];

        // Cartas de ação EXPANDIDAS
        const ACTIONS = [
            {text: "🚀 DEPLOY DE SUCESSO! Avance 8 casas!", move: 8},
            {text: "🐛 Bug Crítico Encontrado! Volte 3 casas.", move: -3},
            {text: "☕ Coffee Break Merecido! Perde a vez.", move: 0},
            {text: "💡 Inovação Tecnológica! Avance 5 casas!", move: 5},
            {text: "🔒 Sistema Travou! Volte 4 casas.", move: -4},
            {text: "🎯 Code Review Aprovado! Avance 6 casas!", move: 6},
            {text: "⚠️ SERVIDOR CAIU! Volte ao início!", move: -999},
            {text: "🏆 Código Otimizado Perfeitamente! Avance 7 casas!", move: 7},
            {text: "📱 App Publicado na Store! Avance 9 casas!", move: 9},
            {text: "🔥 Refatoração Mal Feita! Volte 5 casas.", move: -5},
            {text: "🎉 Sprint Concluída! Avance 4 casas!", move: 4},
            {text: "💾 Esqueceu de Salvar! Volte 2 casas.", move: -2},
            {text: "🌟 Cliente Satisfeito! Avance 6 casas!", move: 6},
            {text: "⚡ Performance Melhorada! Avance 5 casas!", move: 5},
            {text: "🐌 Código Lento Demais! Volte 3 casas.", move: -3}
        ];

        // Gerar inputs de equipes
        function generateTeamInputs() {
            const num = parseInt(document.getElementById('numTeams').value);
            const container = document.getElementById('teamsConfig');
            container.innerHTML = '';

            for (let i = 0; i < num; i++) {
                container.innerHTML += `
                    <div class="team-input" style="border-color: ${TEAM_COLORS[i]}">
                        <h3 style="color: ${TEAM_COLORS[i]}">Equipe ${i + 1} - ${COLOR_NAMES[i]}</h3>
                        <input type="text" id="teamName${i}" placeholder="Nome da equipe" value="Equipe ${COLOR_NAMES[i]}">
                    </div>
                `;
            }
        }

        // Iniciar jogo
        function startGame() {
            const num = parseInt(document.getElementById('numTeams').value);
            gameState.teams = [];

            for (let i = 0; i < num; i++) {
                const name = document.getElementById(`teamName${i}`).value || `Equipe ${i + 1}`;
                gameState.teams.push({
                    name: name,
                    color: TEAM_COLORS[i],
                    position: 0
                });
            }

            gameState.currentTeamIndex = 0;
            gameState.isPlaying = true;

            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';

            buildBoard();
            updateDisplay();
        }

        // Construir tabuleiro
        function buildBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';

            const path = createBoardPath();

            for (let i = 0; i < 40; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell${i}`;

                // Posicionar célula
                cell.style.left = path[i].x + 'px';
                cell.style.top = path[i].y + 'px';

                // Definir tipo de célula
                if (i === 0) {
                    cell.classList.add('start');
                    cell.innerHTML = '🏁';
                } else if (i === 39) {
                    cell.classList.add('finish');
                    cell.innerHTML = '🏆';
                } else if (i % 7 === 0) {
                    cell.classList.add('question');
                    cell.innerHTML = '❓';
                } else if (i % 9 === 0) {
                    cell.classList.add('action');
                    cell.innerHTML = '🎴';
                } else {
                    cell.innerHTML = i;
                }

                board.appendChild(cell);
            }

            drawPieces();
        }

        // Criar caminho do tabuleiro
        function createBoardPath() {
            const path = [];
            const cellSize = 55;
            const boardSize = 560;

            // Linha inferior (0-9)
            for (let i = 0; i < 10; i++) {
                path.push({x: i * cellSize, y: boardSize - cellSize});
            }

            // Coluna direita (10-18)
            for (let i = 1; i < 10; i++) {
                path.push({x: boardSize - cellSize, y: boardSize - cellSize - (i * cellSize)});
            }

            // Linha superior (19-27)
            for (let i = 1; i < 10; i++) {
                path.push({x: boardSize - cellSize - (i * cellSize), y: 0});
            }

            // Coluna esquerda (28-35)
            for (let i = 1; i < 9; i++) {
                path.push({x: 0, y: i * cellSize});
            }

            return path;
        }

        // Desenhar peças
        function drawPieces() {
            document.querySelectorAll('.piece').forEach(p => p.remove());

            gameState.teams.forEach((team, idx) => {
                const cell = document.getElementById(`cell${team.position}`);
                if (cell) {
                    const piece = document.createElement('div');
                    piece.className = 'piece';
                    piece.style.background = team.color;
                    piece.style.left = (13 + idx * 8) + 'px';
                    piece.style.top = (13 + idx * 8) + 'px';
                    cell.appendChild(piece);
                }
            });
        }

        // Atualizar display
        function updateDisplay() {
            const container = document.getElementById('teamsDisplay');
            const currentTeam = gameState.teams[gameState.currentTeamIndex];

            container.innerHTML = gameState.teams.map((team, idx) => `
                <div class="team-card ${idx === gameState.currentTeamIndex ? 'active' : ''}" 
                     style="border-color: ${team.color}">
                    <div class="team-name" style="color: ${team.color}">${team.name}</div>
                    <span class="team-pos">Casa ${team.position}</span>
                </div>
            `).join('');

            document.getElementById('turnInfo').innerHTML = `
                <strong style="color: ${currentTeam.color}">Vez de: ${currentTeam.name}</strong>
            `;
        }

        // Rolar dado
        function rollDice() {
            if (!gameState.isPlaying) return;

            const dice = Math.floor(Math.random() * 6) + 1;
            document.getElementById('rollBtn').disabled = true;
            document.getElementById('diceDisplay').innerHTML = `🎲 ${dice}`;

            setTimeout(() => {
                const pos = gameState.teams[gameState.currentTeamIndex].position;

                if (pos % 7 === 0 && pos !== 0) {
                    showQuestionModal();
                } else if (pos % 9 === 0 && pos !== 0) {
                    showActionModal();
                } else {
                    moveCurrentTeam(dice);
                }
            }, 1000);
        }

        // Mostrar pergunta
        function showQuestionModal() {
            const q = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
            const modal = document.getElementById('gameModal');
            const content = document.getElementById('modalContent');

            const diffClass = q.diff === 'easy' ? 'diff-easy' : q.diff === 'medium' ? 'diff-medium' : 'diff-hard';
            const diffText = q.diff === 'easy' ? 'Fácil' : q.diff === 'medium' ? 'Médio' : 'Difícil';

            content.innerHTML = `
                <h2 class="modal-title">❓ Pergunta de TI</h2>
                <span class="difficulty-badge ${diffClass}">${diffText}</span>
                <div class="question-text">${q.q}</div>
                ${q.opts.map((opt, i) => 
                    `<button class="option-btn" onclick="answerQuestion(${i}, ${q.ans}, ${q.move})">${opt}</button>`
                ).join('')}
            `;

            modal.style.display = 'flex';
        }

        // Responder pergunta
        function answerQuestion(selected, correct, moveAmount) {
            const isCorrect = selected === correct;
            const content = document.getElementById('modalContent');

            const moveValue = isCorrect ? moveAmount : -Math.floor(moveAmount / 2);

            content.innerHTML += `
                <div class="result-box ${isCorrect ? 'result-correct' : 'result-wrong'}">
                    ${isCorrect ? '✅ Correto!' : '❌ Incorreto!'}
                    <br>
                    ${isCorrect ? `Avance ${moveAmount} casas!` : `Volte ${Math.abs(moveValue)} casas!`}
                </div>
                <button class="btn" onclick="closeModalAndMove(${moveValue})">Continuar</button>
            `;
        }

        // Mostrar carta de ação
        function showActionModal() {
            const action = ACTIONS[Math.floor(Math.random() * ACTIONS.length)];
            const modal = document.getElementById('gameModal');
            const content = document.getElementById('modalContent');

            content.innerHTML = `
                <h2 class="modal-title">🎴 Carta de Ação</h2>
                <div class="action-display">${action.text}</div>
                <button class="btn" onclick="closeModalAndMove(${action.move})">Continuar</button>
            `;

            modal.style.display = 'flex';
        }

        // Fechar modal e mover
        function closeModalAndMove(steps) {
            document.getElementById('gameModal').style.display = 'none';
            moveCurrentTeam(steps);
        }

        // Mover equipe atual
        function moveCurrentTeam(steps) {
            const team = gameState.teams[gameState.currentTeamIndex];
            let newPos = team.position + steps;

            if (newPos < 0) newPos = 0;
            if (newPos > 39) newPos = 39;

            animateMovement(team.position, newPos);
        }

        // Animar movimento
        function animateMovement(from, to) {
            const team = gameState.teams[gameState.currentTeamIndex];
            const direction = to > from ? 1 : -1;
            let current = from;

            const moveInterval = setInterval(() => {
                if (current === to) {
                    clearInterval(moveInterval);
                    team.position = to;
                    drawPieces();

                    if (to >= 39) {
                        showWinnerModal();
                    } else {
                        nextTurn();
                    }
                    return;
                }

                current += direction;
                team.position = current;
                drawPieces();

                const pieces = document.querySelectorAll('.piece');
                pieces.forEach(p => p.classList.add('moving'));
                setTimeout(() => pieces.forEach(p => p.classList.remove('moving')), 500);

            }, 400);
        }

        // Próximo turno
        function nextTurn() {
            gameState.currentTeamIndex = (gameState.currentTeamIndex + 1) % gameState.teams.length;
            updateDisplay();
            document.getElementById('rollBtn').disabled = false;
            document.getElementById('diceDisplay').innerHTML = '';
        }

        // Mostrar vencedor
        function showWinnerModal() {
            const winner = gameState.teams[gameState.currentTeamIndex];
            const modal = document.getElementById('gameModal');
            const content = document.getElementById('modalContent');

            content.innerHTML = `
                <div class="winner-box">
                    <div class="winner-trophy">🏆</div>
                    <h2 style="color: ${winner.color}; font-size: 36px; margin: 20px 0;">
                        ${winner.name} Venceu!
                    </h2>
                    <p style="font-size: 20px; color: #666; margin: 20px 0;">
                        Parabéns pela vitória incrível! 🎉
                    </p>
                    <p style="font-size: 16px; color: #999;">
                        Vocês dominaram o conhecimento em TI!
                    </p>
                    <button class="btn" onclick="location.reload()" style="margin-top: 30px;">
                        🔄 Jogar Novamente
                    </button>
                </div>
            `;

            modal.style.display = 'flex';
            gameState.isPlaying = false;
        }

        // Inicializar o jogo ao carregar
        window.addEventListener('DOMContentLoaded', function() {
            generateTeamInputs();
            console.log('🎮 TI Quest carregado com sucesso!');
            console.log(`📚 ${QUESTIONS.length} perguntas disponíveis`);
            console.log(`🎴 ${ACTIONS.length} cartas de ação disponíveis`);
        });
    </script>
</body>

</html>
